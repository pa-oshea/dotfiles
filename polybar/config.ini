;   Standalone Polybar Configuration for Arch Linux
;   No external scripts required
;
;==========================================================

[global/wm]
margin-bottom = 0
margin-top = 0

;==================
; COLOR SCHEME
;==================
[colors]
; Catppuccin Mocha
rosewater = #f5e0dc
flamingo = #f2cdcd
pink = #f5c2e7
mauve = #cba6f7
red = #f38ba8
maroon = #eba0ac
peach = #fab387
yellow = #f9e2af
green = #a6e3a1
teal = #94e2d5
sky = #89dceb
sapphire = #74c7ec
blue = #89b4fa
lavender = #b4befe
text = #cdd6f4
subtext1 = #bac2de
subtext0 = #a6adc8
overlay2 = #9399b2
overlay1 = #7f849c
overlay0 = #6c7086
surface2 = #585b70
surface1 = #45475a
surface0 = #313244
base = #1E1E2E
mantle = #181825
crust = #11111b
transparent = #00000000

; Aliases for convenience
bg = ${colors.base}
fg = ${colors.text}
fg-alt = ${colors.subtext1}
background = ${colors.base}
background-alt = ${colors.surface0}
foreground = ${colors.text}
primary = ${colors.mauve}
secondary = ${colors.mantle}
alert = ${colors.red}
disabled = ${colors.overlay0}

;==================
; MAIN BAR
;==================
[bar/main]
monitor = ${env:MONITOR:}
width = 100%
height = 24pt
radius = 6
background = ${colors.bg}
foreground = ${colors.fg}
bottom = false
line-size = 2pt
border-size = 2pt
border-color = ${colors.surface0}
padding-left = 1
padding-right = 1
module-margin = 1
separator = ""
separator-foreground = ${colors.overlay0}

; Fonts
font-0 = JetBrainsMono Nerd Font:style=Medium:size=10;3
font-1 = JetBrainsMono Nerd Font:style=Bold:size=12;3
font-2 = Material Design Icons:style=Regular:size=12;3

; Modules
modules-left = menu i3 xwindow
modules-center = date
modules-right = cpu memory filesystem pulseaudio network battery powermenu

; Settings
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true
wm-restack = i3
override-redirect = false

;==================
; MODULES
;==================

[module/menu]
type = custom/text
content = 
content-foreground = ${colors.blue}
content-padding = 1
click-left = "rofi -show drun || dmenu_run"
click-right = "rofi -show window || i3-dmenu-desktop"

[module/i3]
type = internal/i3

; Only show workspaces defined on the same output as the bar
pin-workspaces = true

; Split the workspace name on ':'
strip-wsnumbers = true

; Sort the workspaces by index instead of the default
index-sort = true

; Create click handler used to focus workspace
enable-click = true

; Create scroll handlers used to cycle workspaces
enable-scroll = false

; Wrap around when reaching the first/last workspace
wrapping-scroll = false

; Set the scroll cycle direction 
reverse-scroll = false

; Use fuzzy (partial) matching on labels when assigning 
fuzzy-match = true

; Available tags:
;   <label-state> (default) - gets replaced with <label-(focused|unfocused|visible|urgent)>
;   <label-mode> (default)
format = <label-state> <label-mode>

; Available tokens:
;   %mode%
; Default: %mode%
label-mode = %mode%
label-mode-padding = 1
label-mode-foreground = ${colors.base}
label-mode-background = ${colors.red}

; Available tokens:
;   %name%
;   %icon%
;   %index%
;   %output%
; Default: %icon%  %name%
label-focused = %index%
label-focused-foreground = ${colors.base}
label-focused-background = ${colors.blue}
label-focused-padding = 1

; Available tokens:
;   %name%
;   %icon%
;   %index%
;   %output%
; Default: %icon%  %name%
label-unfocused = %index%
label-unfocused-padding = 1
label-unfocused-foreground = ${colors.subtext1}

; Available tokens:
;   %name%
;   %icon%
;   %index%
;   %output%
; Default: %icon%  %name%
label-visible = %index%
label-visible-padding = 1
label-visible-foreground = ${colors.text}

; Available tokens:
;   %name%
;   %icon%
;   %index%
;   %output%
; Default: %icon%  %name%
label-urgent = %index%
label-urgent-foreground = ${colors.base}
label-urgent-background = ${colors.red}
label-urgent-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:50:...%
format-foreground = ${colors.subtext1}
format-padding = 1

[module/updates]
type = custom/script
exec = checkupdates | wc -l
interval = 300
format-prefix = " "
format-prefix-foreground = ${colors.yellow}
format-foreground = ${colors.yellow}
click-left = alacritty -e sudo pacman -Syu

[module/cpu]
type = internal/cpu
interval = 2
format = <label>
format-prefix = Ôíľ 
format-prefix-foreground = ${colors.blue}
format-foreground = ${colors.blue}
label = " %percentage%%"
click-left = alacritty -e htop

[module/memory]
type = internal/memory
interval = 2
format = <label>
format-prefix = ůįćõ 
format-prefix-foreground = ${colors.flamingo}
format-foreground = ${colors.flamingo}
label = " %percentage_used%%"
click-left = alacritty -e htop

[module/filesystem]
type = internal/fs
interval = 25
mount-0 = /
format-mounted = <label-mounted>
format-mounted-prefix         = Ôā†
format-mounted-prefix-foreground = ${colors.sky}
format-mounted-foreground = ${colors.sky}
label-mounted = %free%
format-unmounted-prefix       = ůį§Ā 
label-unmounted = %mountpoint%: not mounted
click-left = alacritty -e ranger

[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = false
interval = 5

format-volume = <ramp-volume> <label-volume>
format-volume-foreground = ${colors.green}
label-volume = %percentage%%

format-muted = <label-muted>
format-muted-prefix         = ůįĖĀ
format-muted-prefix-foreground = ${colors.red}
format-muted-foreground = ${colors.red}
label-muted = Muted

ramp-volume-0 = ÔÄß
ramp-volume-1 = ÔÄ® 

click-right = pavucontrol

[module/network]
type = internal/network
interface-type = wireless
interval = 3.0
accumulate-stats = true
unknown-as-up = true

format-connected = <ramp-signal> <label-connected>
format-connected-foreground = ${colors.yellow}
label-connected = %downspeed%

format-disconnected = <label-disconnected>
format-disconnected-prefix = "ůį§≠ "
format-disconnected-foreground = ${colors.red}
label-disconnected = Offline

ramp-signal-0 = "ůį§ü "
ramp-signal-1 = "ůį§Ę "
ramp-signal-2 = "ůį§• "
ramp-signal-3 = "ůį§® "

click-left = nm-connection-editor

[module/battery]
type = internal/battery
full-at = 99
low-at = 20
battery = BAT0
adapter = ADP1
poll-interval = 5
time-format = %H:%M

format-charging = <animation-charging> <label-charging>
format-charging-foreground = ${colors.green}
label-charging = %percentage%%

format-discharging = <ramp-capacity> <label-discharging>
format-discharging-foreground = ${colors.peach}
label-discharging = %percentage%%

format-full = <label-full>
format-full-prefix = "ÔČÄ  "
format-full-foreground = ${colors.green}
label-full = %percentage%%

format-low = <label-low>
format-low-prefix = " "
format-low-foreground = ${colors.red}
label-low = %percentage%%

ramp-capacity-0 = ÔČĄ 
ramp-capacity-1 = ÔČÉ 
ramp-capacity-2 = ÔČā 
ramp-capacity-3 = ÔČĀ 
ramp-capacity-4 = ÔČÄ 

animation-charging-0 = ůĪźč 
animation-charging-1 = ůĪźĆ 
animation-charging-framerate = 750

[module/date]
type = internal/date
interval = 1.0
date = %a %b %d
time = %I:%M %p
format = <label>
format-prefix = " "
format-prefix-foreground = ${colors.lavender}
format-foreground = ${colors.lavender}
label = %date% %time%
click-left = gnome-calendar || gsimplecal

[module/powermenu]
type = custom/text
content = "‚ŹĽ"
content-foreground = ${colors.red}
content-padding = 1
click-left = "echo -e 'Lock\nLogout\nReboot\nShutdown' | rofi -dmenu -p 'Power:' | while read choice; do case $choice in Lock) i3lock -c 1e1e2e ;; Logout) i3-msg exit ;; Reboot) systemctl reboot ;; Shutdown) systemctl poweroff ;; esac; done"

;==================
; SETTINGS
;==================
[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
